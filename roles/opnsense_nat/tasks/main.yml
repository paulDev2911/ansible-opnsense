---
# Outbound-NAT (Masquerading) für alle VLANs mit internet_access: true.
# OPNsense arbeitet standardmäßig im "Automatic" Outbound-NAT-Modus; wir
# wechseln auf "Hybrid" damit eigene Regeln greifen ohne alles manuell zu
# pflegen.
- name: "Outbound-NAT Modus auf Hybrid setzen"
  ansibleguy.opnsense.nat_outbound_mode:
    firewall: "{{ firewall }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    ssl_verify: false
    mode: "hybrid"

- name: "Outbound-NAT Regel pro VLAN mit Internet-Zugriff"
  ansibleguy.opnsense.nat_outbound:
    firewall: "{{ firewall }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    ssl_verify: false
    description: "NAT {{ item.name | upper }} -> WAN"
    match_fields: ["description"]
    interface: "{{ wan_interface }}"
    source_net: "{{ item.subnet }}"
    target: "interface"   # Quell-IP = WAN-Interface-IP (dynamisches DHCP-kompatibel)
    enabled: true
  loop: "{{ vlans | selectattr('internet_access', 'equalto', true) | list }}"
  notify: reload_nat

- name: "Explizit kein NAT für reine interne Netze (no-nat Marker)"
  ansibleguy.opnsense.nat_outbound:
    firewall: "{{ firewall }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    ssl_verify: false
    description: "NO-NAT {{ item.name | upper }} intern"
    match_fields: ["description"]
    interface: "{{ wan_interface }}"
    source_net: "{{ item.subnet }}"
    destination_net: "{{ item.subnet }}"
    no_nat: true
    enabled: true
  loop: "{{ vlans | selectattr('internet_access', 'equalto', false) | list }}"
  notify: reload_nat
