---
# secrets.yml – MIT ANSIBLE VAULT VERSCHLÜSSELN!
# ansible-vault encrypt group_vars/opnsense/secrets.yml
#
# Danach committen – der verschlüsselte Inhalt ist sicher in Git

vault_opnsense_api_key: "HIER_API_KEY_EINTRAGEN"
vault_opnsense_api_secret: "HIER_API_SECRET_EINTRAGEN"

# WireGuard Peers
wireguard_peers:
  - name: "laptop"
    public_key: "HIER_PUBLIC_KEY"
    allowed_ips: "10.100.0.2/32"
  - name: "smartphone"
    public_key: "HIER_PUBLIC_KEY"
    allowed_ips: "10.100.0.3/32"
