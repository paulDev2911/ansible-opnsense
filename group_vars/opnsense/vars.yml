---
# OPNsense-spezifische Variablen

# WAN Interface
wan_interface: "igc1"

# LAN/Trunk Interface (zum Managed Switch)
lan_interface: "igc0"

# VLANs
vlans:
  - id: 10
    name: "management"
    description: "Management"
    interface: "igc0"
    subnet: "192.168.10.0/24"
    gateway: "192.168.10.1"
    internet_access: false
    dhcp_enabled: false  # Statische IPs im Management-Netz

  - id: 20
    name: "cluster"
    description: "Cluster"
    interface: "igc0"
    subnet: "192.168.20.0/24"
    gateway: "192.168.20.1"
    internet_access: true
    dhcp_enabled: true
    dhcp_range_start: "192.168.20.100"
    dhcp_range_end: "192.168.20.200"

  - id: 30
    name: "storage"
    description: "Storage"
    interface: "igc0"
    subnet: "192.168.30.0/24"
    gateway: "192.168.30.1"
    internet_access: false
    dhcp_enabled: false  # Statische IPs für Storage
    mtu: 9000            # Jumbo Frames

  - id: 40
    name: "client"
    description: "Client"
    interface: "igc0"
    subnet: "192.168.40.0/24"
    gateway: "192.168.40.1"
    internet_access: true
    dhcp_enabled: true
    dhcp_range_start: "192.168.40.100"
    dhcp_range_end: "192.168.40.200"

# Statische IP im Client-VLAN mit Zugriff auf Management
client_mgmt_access_ip: "192.168.40.10"

# Statische DHCP-Leases
static_leases: []

# ---------------------------------------------------------------------------
# Firewall-Regeln
#
# Policy-Übersicht:
#   Management  → alle Netze     (MGMT darf überall hin)
#   Cluster     → Cluster intern (implizit, same-subnet)
#   Cluster     → Internet       (Updates, Images)
#   Cluster     → Storage NFS    (TCP 2049)
#   Cluster     → Storage iSCSI  (TCP 3260)
#   Client      → geblockt       (isoliert, kein inter-VLAN)
#   client_mgmt_access_ip → Management (Ausnahme-Regel)
#   Default     → block all
# ---------------------------------------------------------------------------
firewall_rules:

  # --- Management darf überall hin ---
  - description: "MGMT -> Cluster"
    source_net: "192.168.10.0/24"
    dest_net: "192.168.20.0/24"
    action: "pass"

  - description: "MGMT -> Storage"
    source_net: "192.168.10.0/24"
    dest_net: "192.168.30.0/24"
    action: "pass"

  - description: "MGMT -> Client"
    source_net: "192.168.10.0/24"
    dest_net: "192.168.40.0/24"
    action: "pass"

  # --- Cluster: nur Storage-Protokolle ---
  - description: "Cluster -> Storage NFS"
    source_net: "192.168.20.0/24"
    dest_net: "192.168.30.0/24"
    action: "pass"
    protocol: "TCP"
    dest_port: "2049"

  - description: "Cluster -> Storage iSCSI"
    source_net: "192.168.20.0/24"
    dest_net: "192.168.30.0/24"
    action: "pass"
    protocol: "TCP"
    dest_port: "3260"

  # Cluster -> andere VLANs explizit sperren (vor Internet-Erlaubnis)
  - description: "Cluster -> Management BLOCK"
    source_net: "192.168.20.0/24"
    dest_net: "192.168.10.0/24"
    action: "block"

  - description: "Cluster -> Client BLOCK"
    source_net: "192.168.20.0/24"
    dest_net: "192.168.40.0/24"
    action: "block"

  # --- Client: statische Ausnahme-IP darf Management erreichen ---
  - description: "Client Admin-IP -> MGMT"
    source_net: "{{ client_mgmt_access_ip }}/32"
    dest_net: "192.168.10.0/24"
    action: "pass"

  # Restlicher Client-Traffic zu anderen VLANs geblockt
  - description: "Client -> Management BLOCK"
    source_net: "192.168.40.0/24"
    dest_net: "192.168.10.0/24"
    action: "block"

  - description: "Client -> Cluster BLOCK"
    source_net: "192.168.40.0/24"
    dest_net: "192.168.20.0/24"
    action: "block"

  - description: "Client -> Storage BLOCK"
    source_net: "192.168.40.0/24"
    dest_net: "192.168.30.0/24"
    action: "block"

  # --- DNS-Pinning: alle VLANs müssen OPNsense-DNS nutzen ---
  # Erlaubt DNS-Anfragen an die jeweilige VLAN-Gateway-IP
  - description: "DNS allow -> MGMT Gateway"
    source_net: "192.168.10.0/24"
    dest_net: "192.168.10.1/32"
    action: "pass"
    protocol: "UDP"
    dest_port: "53"

  - description: "DNS allow -> Cluster Gateway"
    source_net: "192.168.20.0/24"
    dest_net: "192.168.20.1/32"
    action: "pass"
    protocol: "UDP"
    dest_port: "53"

  - description: "DNS allow -> Storage Gateway"
    source_net: "192.168.30.0/24"
    dest_net: "192.168.30.1/32"
    action: "pass"
    protocol: "UDP"
    dest_port: "53"

  - description: "DNS allow -> Client Gateway"
    source_net: "192.168.40.0/24"
    dest_net: "192.168.40.1/32"
    action: "pass"
    protocol: "UDP"
    dest_port: "53"

  # Externe DNS-Anfragen (Port 53 an fremde IPs) sperren
  - description: "DNS block external"
    source_net: "any"
    dest_net: "any"
    action: "block"
    protocol: "UDP"
    dest_port: "53"

  # --- Default Deny (Catch-All) ---
  - description: "Default Deny inter-VLAN"
    source_net: "any"
    dest_net: "any"
    action: "block"
