---
# Globale Variablen – gelten für alle Hosts

# OPNsense API Verbindung
opnsense_api_host: "192.168.2.2"
opnsense_api_port: 443
opnsense_api_verify_ssl: false  # true wenn eigenes Zertifikat von step-ca

# API Credentials – in group_vars/opnsense/secrets.yml (ansible-vault verschlüsselt)
# opnsense_api_key: "{{ vault_opnsense_api_key }}"
# opnsense_api_secret: "{{ vault_opnsense_api_secret }}"

# Netzwerk
domain_internal: "home.lab"
ntp_servers:
  - "0.de.pool.ntp.org"
  - "1.de.pool.ntp.org"

# DNS upstream (DoT)
dns_upstream:
  - "9.9.9.9"   # Quad9
  - "1.1.1.1"   # Cloudflare
